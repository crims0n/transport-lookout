name: CI
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install '.[dev]'
      - run: ruff check .
      - run: pytest -q
      - run: docker build -t transport-lookout:${{ github.sha }} .
  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: ui/package-lock.json }
      - run: npm ci
      - run: npm run build
  chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint helm/scanpod-enterprise
      - run: helm template transport-lookout helm/scanpod-enterprise > /dev/null
