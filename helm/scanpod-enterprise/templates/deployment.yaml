apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
spec:
  replicas: {{ .Values.replicas }}
  selector: { matchLabels: { app: {{ .Release.Name }}-api } }
  template:
    metadata: { labels: { app: {{ .Release.Name }}-api } }
    spec:
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      nodeSelector: {{ toYaml .Values.nodeSelector | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args: ["uvicorn", "scanpod_enterprise.main:app", "--host", "0.0.0.0", "--port", "8080"]
          ports: [{ containerPort: 8080 }]
          securityContext: { allowPrivilegeEscalation: false, capabilities: { drop: ["ALL"] } }
          env:
            - { name: SCANPOD_DATABASE_URL, value: {{ .Values.env.databaseUrl | quote }} }
            - { name: SCANPOD_AMQP_URL, value: {{ .Values.env.amqpUrl | quote }} }
            - { name: SCANPOD_BOOTSTRAP_ENABLED, value: {{ .Values.env.bootstrapEnabled | quote }} }
          readinessProbe: { httpGet: { path: /healthz, port: 8080 } }

