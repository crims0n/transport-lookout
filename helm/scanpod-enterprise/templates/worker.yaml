apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "transport-lookout.fullname" . }}-worker
spec:
  replicas: {{ .Values.workerReplicas }}
  selector: { matchLabels: { app: {{ include "transport-lookout.fullname" . }}-worker } }
  template:
    metadata: { labels: { app: {{ include "transport-lookout.fullname" . }}-worker } }
    spec:
      serviceAccountName: {{ include "transport-lookout.serviceAccountName" . }}
      securityContext: { runAsNonRoot: true, seccompProfile: { type: RuntimeDefault } }
      nodeSelector: {{ toYaml .Values.nodeSelector | nindent 8 }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["celery", "-A", "scanpod_enterprise.worker", "worker", "--loglevel=INFO"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"], add: ["NET_RAW"] }
          resources: {{ toYaml .Values.resources.worker | nindent 12 }}
          env:
{{ include "transport-lookout.env" . | nindent 12 }}
